# 日志配置
logLevel: info
logDestinations: [stdout]
logFile: /var/log/mediamtx.log

# API 配置
api: yes
apiAddress: :9997

# RTMP 推流端口（接收 FFmpeg 推流）
rtmp: yes
rtmpAddress: :1935

# RTSP 配置
rtsp: yes
rtspAddress: :8554

# WebRTC 配置（客户端拉流）- 最低延迟
webrtc: yes
webrtcAddress: :8889
webrtcAllowOrigin: "*"

# HLS 配置（备选方案，延迟 2-5 秒）
hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 500ms
hlsPartDuration: 200ms

# 路径配置
paths:
  agv_camera:
    source: publisher
    sourceOnDemand: no
EOF